version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: music-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: music_player
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - music-net

  netease-api:
    build:
      context: .
      dockerfile: Dockerfile.netease
    container_name: music-netease-api
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 256M

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: music-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://music-mysql:3306/music_player?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      JWT_SECRET: ${JWT_SECRET:-music-player-jwt-secret-key-2026-change-in-production}
      NETEASE_API_BASE_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - music-net

networks:
  music-net:
    driver: bridge

volumes:
  mysql_data: